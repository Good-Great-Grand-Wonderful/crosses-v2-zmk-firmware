# Adapted from george-norton/zmk-behavior-sensor-attr-cycle, but targets the
# PAW32xx input driver's paw32xx_set_resolution() API instead of the Zephyr
# sensor attr API (which the PAW3222 driver does not implement).

description: Cycles the resolution (CPI) of a PAW32xx sensor through a list of values.

compatible: "zmk,behavior-paw32xx-res-cycle"

include: one_param.yaml

properties:
  sensor_device:
    required: true
    type: phandle
    description: The target PAW32xx device to set the resolution on.
  values:
    required: true
    type: array
    description: |
      A list of CPI values to cycle through. The PAW3222 driver accepts
      608-4826 and truncates to a multiple of 38 (its register step).
  persistent:
    type: boolean
    description: |
      If enabled the selected index is stored to flash and restored at power
      on. Requires the settings subsystem.
  save_delay:
    default: 2000
    type: int
    description: Time in milliseconds to wait before saving to flash.
  load_delay:
    default: 0
    type: int
    description: |
      A delay in milliseconds before the setting loaded from flash is sent to
      the device, in case the driver is not ready early in boot.
